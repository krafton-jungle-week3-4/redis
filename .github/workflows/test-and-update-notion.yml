name: Test Main And Update Notion

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run_tests
        shell: bash
        run: |
          set +e
          python scripts/run_qa_suite.py --results-file testresult.txt --report-file qa_report.json
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload raw test result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresult
          path: |
            testresult.txt
            qa_report.json

      - name: Validate QA report for Notion
        if: always()
        run: python scripts/update_notion_test_results.py qa_report.json --dry-run > /tmp/notion_payload.json

      - name: Summarize QA report
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("qa_report.json").read_text(encoding="utf-8"))
          counts = report.get("counts", {})

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## QA report\n")
              summary.write(f"- Cases: {len(report.get('cases', []))}\n")
              summary.write(f"- Summary: {report.get('summary_text', 'unknown')}\n")
              summary.write(
                  "- Status counts: "
                  f"pass={counts.get('pass', 0)}, "
                  f"fail={counts.get('fail', 0)}, "
                  f"partial={counts.get('partial', 0)}, "
                  f"not_covered={counts.get('not_covered', 0)}\n"
              )
          PY

      - name: Update Notion page
        id: update_notion
        if: always() && env.NOTION_TOKEN != ''
        continue-on-error: true
        env:
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/update_notion_test_results.py qa_report.json

      - name: Record Notion update failure
        if: always() && steps.update_notion.outcome == 'failure'
        run: |
          {
            echo "## Notion update failed"
            echo
            echo "The test run completed, but writing to Notion failed."
            echo "Check that the target page is shared with the integration and that NOTION_PAGE_ID is correct."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when tests fail
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
