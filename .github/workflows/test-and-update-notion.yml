name: Test Main And Update Notion

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run_tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_*.py' -q 2>&1 | tee testresult.txt
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload raw test result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresult
          path: testresult.txt

      - name: Update Notion page
        if: always() && env.NOTION_TOKEN != ''
        env:
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/update_notion_test_results.py testresult.txt

      - name: Fail workflow when tests fail
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
